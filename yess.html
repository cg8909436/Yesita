<!DOCTYPE html><html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Feliz Cumple Yess 🎀</title>
  <style>
    body {
      margin: 0;
      font-family: 'Comic Sans MS', cursive;
      background: linear-gradient(180deg, #ffd6ec, #ffeef7);
      overflow-x: hidden;
      text-align: center;
    }.screen {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  animation: fadeIn 1s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

button {
  padding: 12px 20px;
  border: none;
  border-radius: 20px;
  background: #ff8fcf;
  color: white;
  font-size: 16px;
  margin: 10px;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: #ff6bb5;
  transform: scale(1.05);
}

.hidden { display: none; }

.message {
  max-width: 80%;
  font-size: 18px;
  margin: 20px auto;
}

img {
  width: 150px;
  margin-bottom: 20px;
  animation: float 3s ease-in-out infinite;
}

@keyframes float {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}

.hearts {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
}

.heart {
  position: absolute;
  color: #ff69b4;
  animation: fall linear infinite;
}

@keyframes fall {
  0% { transform: translateY(-10%); opacity: 1; }
  100% { transform: translateY(110vh); opacity: 0; }
}

  </style>
</head>
<body><audio id="music" loop>
  <source src="https://cdn.pixabay.com/audio/2023/03/20/audio_1c9d3b9c1b.mp3" type="audio/mpeg">
</audio><div id="screen1" class="screen">  <h1>🎀 Toca para una sorpresa 🎀</h1>
  <button onclick="start()">Abrir</button>
</div><div id="screen2" class="screen hidden">
  <h2 id="counter" style="font-size:28px;color:#ff4da6;">🎂 0 años 🎂</h2>  <div id="typed" class="message"></div>
  <button onclick="showButtons()">Continuar 💖</button>
</div><div id="screen3" class="screen hidden"><button onclick="showText(0)">💖 Lee esto</button> <button onclick="showText(1)">🎀 Otro mensajito</button> <button onclick="showText(2)">🌸 Un secreto</button>

  <div id="extra" class="message"></div>
  <button onclick="finish()">Final 🎉</button>
</div><div id="screen4" class="screen hidden">  <h2>Gracias por estar 💗</h2>
  <p>No soy bueno para las palabras... pero disfruta este hermoso día 🎂✨</p>
</div><div class="hearts" id="hearts"></div><script>
  const text = "Yess, muy feliz cumpleaños 🎂💖 hoy cumples 26 años en este mundo, pasaste momentos buenos y malos pero siempre sales adelante y estás con una sonrisa cada día...";
  let i = 0;
  let count = 0;

  function start() {
    animateCounter();
    document.getElementById('screen1').classList.add('hidden');
    document.getElementById('screen2').classList.remove('hidden');
    document.getElementById('music').play();
    typeWriter();
  }

  function typeWriter() {
    if (i < text.length) {
      document.getElementById('typed').innerHTML += text.charAt(i);
      i++;
      setTimeout(typeWriter, 40);
    }
  }

  function animateCounter() {
    const target = 26;
    const counterElement = document.getElementById('counter');
    const interval = setInterval(() => {
      count++;
      counterElement.innerText = "🎂 " + count + " años 🎂";
      if (count >= target) clearInterval(interval);
    }, 80);
  }

  function showButtons() {
    document.getElementById('screen2').classList.add('hidden');
    document.getElementById('screen3').classList.remove('hidden');
  }

  const messages = [
    "Nos haces reír con tus lives y te agradezco por eso 💕",
    "Me pone feliz que estés progresando todos los días 🌸",
    "Que cada día crezcas más como persona ✨"
  ];

  function showText(index) {
    document.getElementById('extra').innerText = messages[index];
  }

  function finish() {
    document.getElementById('screen3').classList.add('hidden');
    document.getElementById('screen4').classList.remove('hidden');
    createHearts();
  }

  function createHearts() {
    const container = document.getElementById('hearts');
    for (let i = 0; i < 40; i++) {
      const heart = document.createElement('div');
      heart.classList.add('heart');
      heart.style.left = Math.random() * 100 + 'vw';
      heart.style.fontSize = Math.random() * 20 + 10 + 'px';
      heart.innerText = '💖';
      heart.style.animationDuration = (Math.random() * 3 + 2) + 's';
      container.appendChild(heart);
    }
  }
</script><div style="position:fixed; bottom:10px; width:100%; text-align:center; font-size:12px; color:#ff8fcf; opacity:0.7; pointer-events:none;">
  hecho por Cris 💖
</div>
</body>
</html>
